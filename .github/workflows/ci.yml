name: OrangeHRM CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'    

      - name: Run Tests
        run: mvn clean test
        working-directory: booking.com

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/logs/
            **/reports/
            **/screenshots/


        # ✅ Save artifacts BEFORE switching branch
      # - name: Save artifacts
      #   run: |
      #     mkdir temp
      #     Copy-Item -Recurse -Force booking.com/logs temp/
      #     Copy-Item -Recurse -Force booking.com/screenshots temp/
      #     Copy-Item -Recurse -Force booking.com/reports temp/

      - name: Debug project structure
        run: |
           Get-ChildItem -Recurse -Directory

      - name: Save artifacts
        run: |
           $tempPath = "$env:RUNNER_TEMP\artifacts"

           # Clean temp (important)
           Remove-Item -Recurse -Force $tempPath -ErrorAction SilentlyContinue
       
           # Create structure
           New-Item -ItemType Directory -Path "$tempPath/reports" -Force
           New-Item -ItemType Directory -Path "$tempPath/logs" -Force
           New-Item -ItemType Directory -Path "$tempPath/screenshots" -Force
       
           # Copy correctly
           Copy-Item -Recurse -Force "booking.com/reports/*" "$tempPath/reports/"
           Copy-Item -Recurse -Force "booking.com/logs/*" "$tempPath/logs/"
           Copy-Item -Recurse -Force "booking.com/screenshots/*" "$tempPath/screenshots/"



      - name: Debug temp
        run: |
           Get-ChildItem "$env:RUNNER_TEMP\artifacts" -Recurse

           
# ✅ Now switch branch
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages



# ✅ 
      - name: Clean gh-pages
        run: |
           Get-ChildItem -Force | Where-Object { $_.Name -ne '.git' } | Remove-Item -Recurse -Force

    # 8️⃣ Create static index.html
      - name: Create index
        run: |
           Set-Content index.html "<meta http-equiv='refresh' content='0; url=reports/latest/ExtentReport.html'>"


# ✅ Commit & push
      - name: Deploy
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Update report" || echo "No changes"

          git push origin gh-pages --force

